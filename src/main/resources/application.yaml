spring:
  application:
    name: event

    server:
      port: 8080
    spring:
      datasource:
        url: jdbc:mysql://localhost:3306/event_app?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
        username: root
        password: 1234567890
        driver-class-name: com.mysql.cj.jdbc.Driver
      jpa:
        hibernate:
          ddl-auto: validate
        show-sql: false
        properties:
          hibernate:
            dialect: org.hibernate.dialect.MySQL8Dialect
    app:
      jwt:
        secret: your-256-bit-secret-key-change-in-production
        expiration: 86400000       # 24 hours in ms
        refresh-expiration: 604800000  # 7 days

